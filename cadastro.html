<!DOCTYPE html>
<html lang="en">

<head>
  <title>Home</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width" />
  <link rel="stylesheet" href="cadastro.css" />
</head>

<body>

  <div class="cabecalho">
    <img src="https://static.wikia.nocookie.net/valorant/images/0/09/Wingman.png/revision/latest?cb=20230307075701" width="30px" height="30px"
    style="margin-left: 10px;">
    <p> ValoMaps </p>
  </div>

  <div class="gekko">
    <img
      src="https://images.contentstack.io/v3/assets/bltb6530b271fddd0b1/bltc942933be01094ae/6402724fe9f75310481c3851/V_AGENTS_587x900_Gekko2.png"
      alt="Gekko">
  </div>

  <header>
    <h1>Cadastro</h1>
  </header>

  <main>
    <!-- <label for="nome">Email:</label> -->
    <input type="text" name="" id="nome" placeholder="Nome de Usuário">
    <p id="alertaNome"></p>

    <input type="text" name="" id="email" placeholder="Email">
    <p id="alertaEmail"></p>

    <!-- <label for="senha">Senha:</label> -->
    <input type="text" name="" id="senha" placeholder="Senha">
    <p id="alertaSenha"></p>

    <input type="text" name="" id="CPF" placeholder="CPF">
    <p id="alertaCPF"></p>

    <label for="nascimento">Informe a data do seu nascimento:</label>
    <input type="date" id="nascimento" name="" min="1930-01-01" max="2014-01-01">
    <p id="alertaNascimento"></p>

    <button onclick="cadastrar()"> Cadastrar </button>
  </main>

  <div class="jett">
    <img
      src="https://images.contentstack.io/v3/assets/bltb6530b271fddd0b1/bltceaa6cf20d328bd5/5eb7cdc1b1f2e27c950d2aaa/V_AGENTS_587x900_Jett.png"
      alt="Jett" style="position: absolute; top: 60px; right: 0;">
  </div>

  <script src="cadastro.js"></script>

</body>

</html>
