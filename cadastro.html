<!DOCTYPE html>
<html lang="en">

<head>
  <title>Home</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width" />
  <link rel="stylesheet" href="cadastro.css" />
</head>

<body>

  <div class="cabecalho">
    <img id="logo" src="../imagens/Logo.png">
    <p> ValoMaps </p>
  </div>

  <div id="gekko">
    <img
      src="https://images.contentstack.io/v3/assets/bltb6530b271fddd0b1/bltc942933be01094ae/6402724fe9f75310481c3851/V_AGENTS_587x900_Gekko2.png"
      alt="Gekko">
  </div>

  <header>
    <h1>Cadastro</h1>
  </header>

  <main>

    <input type="text" name="" id="nome" placeholder="Nome de Usuário">
    <p class="aviso" id="alertaNome"></p>

    <input type="text" name="" id="email" placeholder="Email">
    <p class="aviso" id="alertaEmail"></p>

    <input type="text" name="" id="senha" placeholder="Senha">
    <p class="aviso" id="alertaSenha"></p>

    <input type="text" name="" id="CPF" placeholder="CPF">
    <p class="aviso" id="alertaCPF"></p>

    <label for="nascimento">Informe a data do seu nascimento:</label>
    <input type="date" id="nascimento" name="" min="1930-01-01" max="2014-01-01">
    <p class="aviso" id="alertaNascimento"></p>

    <button onclick="cadastrar()"> Cadastrar </button>

    <button id="conta" onclick="window.location.href='../login/login.html'"> Já tem uma conta? </button>

  </main>

  <div id="jett">
    <img
      src="https://images.contentstack.io/v3/assets/bltb6530b271fddd0b1/bltceaa6cf20d328bd5/5eb7cdc1b1f2e27c950d2aaa/V_AGENTS_587x900_Jett.png"
      alt="Jett">
  </div>

  <script src="cadastro.js"></script>

</body>

</html>
